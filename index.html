<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  
  <style>
    :root { 
      --sidebar-width-pc: 250px; 
      --sidebar-width-mobile: 110px; 
    }

    /* [사이드바 디자인 - 기존 유지] */
    .sidebar .app-name a { font-size: 19px !important; line-height: 1.2 !important; display: block !important; color: #0056b3 !important; font-weight: 800 !important; }
    .sidebar-nav, .sidebar-nav ul, .sidebar-nav li { margin: 0 !important; padding: 0 !important; list-style: none !important; }
    
    /* 카테고리 제목(초록색) */
    .sidebar-nav strong { font-size: 17px !important; color: #28a745 !important; padding-left: 5px !important; margin-top: 15px !important; display: block; cursor: pointer; }
    
    /* 메뉴 및 클릭 시 파란색 강조 */
    .sidebar-nav a { font-size: 16px !important; padding: 4px 5px !important; color: #444 !important; display: block !important; text-decoration: none !important; transition: all 0.2s; }
    .sidebar-nav li.active > a, .sidebar-nav a:hover { color: #0056b3 !important; font-weight: bold !important; text-decoration: underline !important; text-decoration-color: #0056b3 !important; }

    /* [2. ★ 본문 가독성: 줄 간격 유지 & 문단 간격 축소 ★] */
    .markdown-section {
      font-size: 18px !important; 
      line-height: 3.0 !important;
      color: #222 !important;
      padding: 30px 20px !important;
    }

    /* 본문(p), 리스트(li)의 기본 간격 */
    .markdown-section p, 
    .markdown-section li { 
      margin-top: 0 !important;
      margin-bottom: 10px !important; /* 본문 간격 더 좁게 */
    }

    /* ★ 핵심: 제목 밑에 바로 내용이 붙도록 설정 ★ */
    .markdown-section h1, 
    .markdown-section h2, 
    .markdown-section h3 { 
      margin-top: 30px !important; /* 제목 위쪽은 여유를 주고 */
      margin-bottom: 5px !important; /* ★ 제목 아래쪽은 5px로 바짝 붙임 ★ */
    }

    /* ★ 리스트(점 찍힌 항목)가 시작될 때 위쪽 여백 완전 제거 ★ */
    .markdown-section ul, 
    .markdown-section ol {
      margin-top: 0 !important;
    }

/* [레이아웃 제어 - 자석 효과 유지] */
    /* [화면 가로 흔들림 완벽 차단] */
    body, html { overflow-x: hidden !important; } 

    /* ★★★ 핵심 원인 해결: vue.css의 300px 우측 밀림 강제 속성을 우선순위로 완벽히 덮어쓰기 ★★★ */
    body main,
    body.close main,
    body:not(.close) main {
      transform: none !important;
      left: 0 !important;
    }

    /* [레이아웃 제어 (우측 튕김 방지)] */
    .sidebar { 
      position: fixed !important; 
      top: 0 !important; 
      left: 0 !important; 
      right: auto !important; 
      height: 100vh !important; 
      background: white !important; 
      transition: transform 0.3s ease !important; 
      z-index: 1000 !important; 
      border-right: 1px solid #eee; 
    }

    .content { 
      position: absolute !important; 
      top: 0 !important; 
      left: 0 !important; 
      transition: all 0.3s ease !important; 
    }

    @media screen and (min-width: 769px) {
      .sidebar { width: var(--sidebar-width-pc) !important; left: 0 !important; }
      body:not(.close) .content { left: var(--sidebar-width-pc) !important; width: calc(100% - var(--sidebar-width-pc)) !important; }
      body.close .sidebar { transform: translateX(-250px) !important; }
      body.close .content { left: 0 !important; width: 100% !important; }
    }

    @media screen and (max-width: 768px) {
      .sidebar { width: var(--sidebar-width-mobile) !important; left: 0 !important; }
      
      /* 모바일에서 메뉴 열 때: 본문이 110px 옆으로 밀려남 (원하시던 동작) */
      body:not(.close) .content { 
        left: var(--sidebar-width-mobile) !important; 
        width: calc(100% - var(--sidebar-width-mobile)) !important; 
        transform: none !important; 
      }
      
      /* 모바일에서 메뉴 닫을 때 */
      body.close .sidebar { transform: translateX(-110px) !important; }
      body.close .content { left: 0 !important; width: 100% !important; transform: none !important; }
      
      .sidebar-toggle { width: 40px !important; height: 40px !important; background: #28a745 !important; left: 15px !important; bottom: 25px !important; top: auto !important; display: flex !important; align-items: center; justify-content: center; border-radius: 50% !important; z-index: 1001 !important; }
      .sidebar-toggle span { width: 20px !important; height: 3px !important; background: white !important; margin: 4px 0 !important; display: block; }
      .sidebar-overlay { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD<br>지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      basePath: './',
      /* ★ 2. 사이드바 접기 설정 추가 ★ */
      sidebarDisplay: 'collapse'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>

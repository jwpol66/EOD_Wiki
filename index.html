<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <style>
    :root {
      --sidebar-width: 200px;
    }

    /* 1. 사이드바 제목 (EOD 지식창고) - 짙은 파란색으로 */
    .sidebar .app-name a {
      font-size: 35px !important;
      color: #0056b3 !important; /* 확실한 파란색 */
      font-weight: 800 !important;
      text-decoration: none;
    }

    /* 2. 상위 카테고리 (화공품 정보 등) - 진한 녹색으로 */
    .sidebar-nav strong {
      font-size: 25px !important;
      color: #28a745 !important; /* 확실한 녹색 */
      display: block;
      margin-top: 25px;
    }

    /* 3. 하위 메뉴 (전기식 뇌관 등) - 진한 회색 */
    .sidebar-nav ul li a {
      font-size: 20px !important;
      color: #444 !important;
      padding: 10px 0 !important;
    }

    /* 4. 마우스를 올렸을 때 색상 변화 */
    .sidebar-nav a:hover {
      color: #ff5722 !important; /* 주황색으로 변화 */
      text-decoration: underline !important;
    }
  </style>
  </head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

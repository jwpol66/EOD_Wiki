<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  
  <style>
    :root { 
      --sidebar-width-pc: 250px; 
      --sidebar-width-mobile: 110px; 
    }

    /* [사이드바 디자인 - 기존 유지] */
    .sidebar .app-name a { font-size: 19px !important; line-height: 1.2 !important; display: block !important; color: #0056b3 !important; font-weight: 800 !important; }
    .sidebar-nav, .sidebar-nav ul, .sidebar-nav li { margin: 0 !important; padding: 0 !important; list-style: none !important; }
    
    /* 카테고리 제목(초록색) */
    .sidebar-nav strong { font-size: 17px !important; color: #28a745 !important; padding-left: 5px !important; margin-top: 15px !important; display: block; cursor: pointer; }
    
    /* 메뉴 및 클릭 시 파란색 강조 */
    .sidebar-nav a { font-size: 16px !important; padding: 4px 5px !important; color: #444 !important; display: block !important; text-decoration: none !important; transition: all 0.2s; }
    .sidebar-nav li.active > a, .sidebar-nav a:hover { color: #0056b3 !important; font-weight: bold !important; text-decoration: underline !important; text-decoration-color: #0056b3 !important; }

    /* [본문 가독성 - 정원님 설정 유지] */
    .markdown-section { font-size: 18px !important; line-height: 3.0 !important; color: #222 !important; padding: 30px 10px !important; }
    .markdown-section p, .markdown-section li, .markdown-section h1, .markdown-section h2 { margin-top: 0 !important; margin-bottom: 15px !important; }

    /* [레이아웃 제어 - 자석 효과 유지] */
    .sidebar { position: fixed !important; top: 0 !important; height: 100vh !important; background: white !important; transition: transform 0.3s ease !important; z-index: 1000 !important; border-right: 1px solid #eee; }
    .content { position: absolute !important; top: 0 !important; right: 0 !important; transition: all 0.3s ease !important; }

    @media screen and (min-width: 769px) {
      .sidebar { width: var(--sidebar-width-pc) !important; left: 0 !important; }
      body:not(.close) .content { left: var(--sidebar-width-pc) !important; width: calc(100% - var(--sidebar-width-pc)) !important; }
      body.close .sidebar { transform: translateX(-250px) !important; }
      body.close .content { left: 0 !important; width: 100% !important; }
    }

    @media screen and (max-width: 768px) {
      .sidebar { width: var(--sidebar-width-mobile) !important; left: 0 !important; }
      body:not(.close) .content { left: var(--sidebar-width-mobile) !important; width: calc(100% - var(--sidebar-width-mobile)) !important; transform: none !important; }
      body.close .sidebar { transform: translateX(-110px) !important; }
      body.close .content { left: 0 !important; width: 100% !important; transform: none !important; }
      .sidebar-toggle { width: 70px !important; height: 70px !important; background: #28a745 !important; left: 15px !important; bottom: 25px !important; top: auto !important; display: flex !important; align-items: center; justify-content: center; border-radius: 50% !important; z-index: 1001 !important; }
      .sidebar-toggle span { width: 30px !important; height: 4px !important; background: white !important; margin: 4px 0 !important; display: block; }
      .sidebar-overlay { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD<br>지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      basePath: './',
      /* ★ 2. 사이드바 접기 설정 추가 ★ */
      sidebarDisplay: 'collapse'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>

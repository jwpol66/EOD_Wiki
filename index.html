<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <style>
    :root {
      /* 1. 사이드바 전체 가로 폭 조절 (기본 300px -> 230px로 축소) */
      --sidebar-width: 200px;
    }

    /* 2. 사이드바 메뉴 글자 크기 키우기 */
    .sidebar-nav {
      font-size: 20px; /* 글자 크기 (기본보다 크게) */
      font-weight: 500;
    }

    /* 3. 사이드바 항목 간의 간격 넓히기 (터치하기 쉽게) */
    .sidebar-nav ul li {
      margin: 10px 0;
    }

    /* 4. 모바일 전용 추가 수정 (선택사항) */
    @media screen and (max-width: 768px) {
      .sidebar {
        width: 230px; /* 모바일에서도 폭 유지 */
      }
    }
  </style>
  </head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    /* [1. 기본 변수 설정] */
    :root { 
      --sidebar-width-pc: 250px; 
      --sidebar-width-mobile: 180px; 
    }

    /* [2. 정원님 테마 디자인 유지] */
    .sidebar .app-name a { font-size: 26px !important; color: #0056b3 !important; font-weight: 800 !important; text-decoration: none !important; }
    .sidebar-nav strong { font-size: 18px !important; color: #28a745 !important; display: block; margin-top: 15px !important; }
    .sidebar-nav ul li a { font-size: 17px !important; color: #444 !important; }

    /* [3. 본문 가독성: 줄 간격 2.2배] */
    .markdown-section {
      font-size: 28px !important; 
      line-height: 2.2 !important;
      padding: 30px 20px !important;
    }

    /* [4. ★ 핵심: PC와 모바일 통합 레이아웃 제어 ★] */
    
    /* 사이드바 공통 설정 */
    .sidebar {
      position: fixed !important;
      top: 0 !important;
      height: 100vh !important;
      background: white !important;
      transition: transform 0.3s ease !important;
      z-index: 1000 !important;
    }

    /* 본문 공통 설정 */
    .content {
      position: absolute !important;
      top: 0 !important;
      right: 0 !important;
      transition: all 0.3s ease !important;
    }

    /* (A) PC 버전 (769px 이상) */
    @media screen and (min-width: 769px) {
      .sidebar { width: var(--sidebar-width-pc) !important; left: 0 !important; }
      /* 메뉴 열림 */
      body:not(.close) .content { left: var(--sidebar-width-pc) !important; width: calc(100% - var(--sidebar-width-pc)) !important; }
      /* 메뉴 닫힘 */
      body.close .sidebar { transform: translateX(-250px) !important; }
      body.close .content { left: 0 !important; width: 100% !important; }
    }

    /* (B) 모바일 버전 (768px 이하) */
    @media screen and (max-width: 768px) {
      .sidebar { width: var(--sidebar-width-mobile) !important; left: 0 !important; }
      
      /* ★ 메뉴 열림: 본문이 도망가지 않고 사이드바 바로 옆에 딱 붙음 ★ */
      body:not(.close) .content { 
        left: var(--sidebar-width-mobile) !important; 
        width: calc(100% - var(--sidebar-width-mobile)) !important; 
        transform: none !important; /* Docsify의 자동 밀어내기 방지 */
      }
      
      /* ★ 메뉴 닫힘: 본문이 왼쪽 끝(0)부터 꽉 참 ★ */
      body.close .sidebar { transform: translateX(-180px) !important; }
      body.close .content { 
        left: 0 !important; 
        width: 100% !important; 
        transform: none !important; 
      }

      /* 초록색 삼선 버튼 (적당한 80px) */
      .sidebar-toggle {
        width: 80px !important; height: 80px !important;
        background: #28a745 !important;
        left: 15px !important; bottom: 25px !important; top: auto !important;
        display: flex !important; align-items: center; justify-content: center;
        border-radius: 50% !important; z-index: 1001 !important;
      }
      .sidebar-toggle span { width: 40px !important; height: 5px !important; background: white !important; margin: 5px 0 !important; display: block; }
      
      /* 모바일에서 배경 어두워지는 효과 제거 (PC처럼 보이게) */
      .sidebar-overlay { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      basePath: './'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

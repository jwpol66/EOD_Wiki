<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <style>
    :root {
      /* 사이드바 가로 폭을 좁게 유지 (230px) */
      --sidebar-width: 230px;
    }

    /* 1. 상위 카테고리 (화공품 정보, SOP 등) 글자 크기 */
    .sidebar-nav strong {
      font-size: 40px;   /* 상위 카테고리 크기 */
      color: #333;       /* 글자색을 진하게 */
      display: block;
      margin-top: 20px;  /* 카테고리 간의 위쪽 간격 */
      margin-bottom: 10px;
    }

    /* 2. 하위 메뉴 (전기식 뇌관, 대피 거리 등) 글자 크기 */
    .sidebar-nav a {
      font-size: 30px !important; /* 하위 메뉴 크기 */
      font-weight: normal;
      line-height: 1.5;
      padding: 8px 0;    /* 터치하기 좋게 상하 간격 추가 */
    }

    /* 3. 현재 선택된 메뉴 강조 */
    .sidebar-nav li.active > a {
      font-weight: bold;
      color: #42b983;    /* 강조 색상 (초록색) */
      border-right: 3px solid #42b983;
    }
  </style>
  </head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

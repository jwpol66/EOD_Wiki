<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <style>
    :root { --sidebar-width: 250px; }

    /* [1. 정원님 전용 디자인 테마] */
    .sidebar .app-name a { font-size: 28px !important; color: #0056b3 !important; font-weight: 800 !important; }
    .sidebar-nav strong { font-size: 22px !important; color: #28a745 !important; display: block; margin-top: 20px !important; }
    .sidebar-nav ul li a { font-size: 19px !important; color: #444 !important; }
    .sidebar-nav a:hover { color: #ff5722 !important; text-decoration: underline !important; }

    /* [2. 본문 우주급 가독성 (줄 간격 2.2배)] */
    .markdown-section {
      font-size: 28px !important; 
      line-height: 2.2 !important; /* 문장 사이 간격을 널널하게 */
      color: #222 !important;
      padding: 40px 25px !important;
    }
    .markdown-section p, .markdown-section li { margin-bottom: 35px !important; }

    /* [3. ★ 휴대폰 전용: 정통 사이드바 & 적당한 대왕 버튼 ★] */
    @media screen and (max-width: 768px) {
      /* 본문 영역: 평소에는 100% 확장 */
      .content { 
        left: 0 !important; 
        width: 100% !important; 
        position: absolute !important;
        transition: transform 0.3s ease !important; /* 옆으로 밀리는 효과 */
      }

      /* 메뉴가 열리면 본문이 오른쪽으로 슥 밀림 (본문 일부 노출) */
      body:not(.close) .content {
        transform: translateX(250px) !important;
        opacity: 0.4; /* 본문이 있음을 보여주되 메뉴에 집중 */
      }

      /* 사이드바: 왼쪽에서 나타남 (화면 전체가 아닌 메뉴폭만큼만) */
      .sidebar {
        width: 250px !important;
        height: 100vh !important;
        left: 0 !important;
        top: 0 !important;
        background: white !important;
        transition: transform 0.3s ease !important;
        z-index: 1000 !important;
      }
      /* 메뉴 닫힘: 왼쪽 밖으로 숨김 */
      body.close .sidebar { transform: translateX(-250px) !important; }
      /* 메뉴 열림: 안쪽으로 들어옴 */
      body:not(.close) .sidebar { transform: translateX(0) !important; }

      /* ★ '적당히 큰' 초록색 삼선 버튼 (80px) ★ */
      .sidebar-toggle {
        width: 80px !important; height: 80px !important;
        background: #28a745 !important;
        left: 20px !important; bottom: 30px !important; top: auto !important;
        display: flex !important; align-items: center; justify-content: center;
        border-radius: 50% !important; z-index: 10001 !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
      }
      /* 삼선 굵기 조정 */
      .sidebar-toggle span { 
        width: 40px !important; height: 5px !important; 
        background: white !important; margin: 5px 0 !important;
        display: block;
      }
    }

    /* PC 모드: 기존 사이드바 방식 유지 */
    @media screen and (min-width: 769px) {
      .sidebar { left: 0 !important; width: var(--sidebar-width) !important; position: fixed !important; }
      .content { left: var(--sidebar-width) !important; position: absolute !important; }
      body.close .sidebar { transform: translateX(-250px) !important; }
      body.close .content { left: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      basePath: './'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

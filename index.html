<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <style>
    :root { --sidebar-width: 250px; }

    /* [디자인 테마 유지] */
    .sidebar .app-name a { font-size: 30px !important; color: #0056b3 !important; font-weight: 800 !important; text-decoration: none !important; }
    .sidebar-nav strong { font-size: 24px !important; color: #28a745 !important; display: block !important; margin-top: 25px !important; }
    .sidebar-nav ul li a { font-size: 20px !important; color: #444 !important; }
    .sidebar-nav a:hover { color: #ff5722 !important; text-decoration: underline !important; }

    /* [2. 본문 우주급 가독성 설정] */
    .markdown-section {
      font-size: 28px !important; 
      /* ★ 줄 간격을 2.4배로 늘려 문장 사이를 아주 널널하게 만듦 ★ */
      line-height: 2.4 !important;
      color: #222 !important;
      padding: 50px 30px !important;
    }
    .markdown-section p, .markdown-section li { margin-bottom: 40px !important; }
    .markdown-section h1 { font-size: 45px !important; margin-bottom: 40px !important; }

    /* [3. PC 모드 레이아웃] */
    @media screen and (min-width: 769px) {
      .sidebar { left: 0 !important; width: var(--sidebar-width) !important; position: fixed !important; }
      .content { left: var(--sidebar-width) !important; position: absolute !important; }
      body.close .sidebar { transform: translateX(-250px) !important; }
      body.close .content { left: 0 !important; }
    }

    /* [4. ★ 휴대폰 모드: 진짜 대왕 버튼 & 바텀-업 메뉴 ★] */
    @media screen and (max-width: 768px) {
      .content { left: 0 !important; width: 100% !important; transition: opacity 0.3s !important; }

      /* ★ 120px 초대형 삼선 버튼 (장갑 낀 상태에서도 터치 가능) ★ */
      .sidebar-toggle {
        width: 120px !important; height: 120px !important;
        background: #28a745 !important;
        left: 20px !important; bottom: 30px !important; top: auto !important;
        display: flex !important; align-items: center; justify-content: center;
        border-radius: 50% !important; z-index: 10000 !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
      }
      /* 버튼 안의 ≡ 모양도 훨씬 굵고 크게 */
      .sidebar-toggle span { 
        width: 60px !important; height: 8px !important; 
        background: white !important; margin: 8px 0 !important; 
        display: block;
      }

      /* 사이드바: 아래에서 위로 올라오는 서랍장 방식 */
      .sidebar {
        width: 100% !important; height: 80vh !important;
        left: 0 !important; bottom: 0 !important; top: auto !important;
        background: white !important;
        border-top: 8px solid #28a745;
        border-radius: 40px 40px 0 0;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
        z-index: 9999 !important;
      }

      body.close .sidebar { transform: translateY(100%) !important; }
      body:not(.close) .sidebar { transform: translateY(0) !important; }
      body:not(.close) .content { opacity: 0.1; } /* 메뉴 열리면 본문은 거의 안보이게 */
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      basePath: './'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    :root { 
      --sidebar-width-pc: 250px; 
      --sidebar-width-mobile: 180px; 
    }

    /* [1. 정원님 테마 디자인 유지] */
    .sidebar .app-name a { font-size: 26px !important; color: #0056b3 !important; font-weight: 800 !important; text-decoration: none !important; }
    .sidebar-nav strong { font-size: 18px !important; color: #28a745 !important; display: block; margin-top: 15px !important; }
    .sidebar-nav ul li a { font-size: 17px !important; color: #444 !important; }

    /* [2. 본문 우주급 가독성: 줄 간격 2.2배] */
    .markdown-section {
      font-size: 28px !important; 
      line-height: 2.2 !important;
      padding: 30px 20px !important;
    }

    /* [3. PC 모드 (성공했던 설정 그대로)] */
    @media screen and (min-width: 769px) {
      .sidebar { left: 0 !important; width: var(--sidebar-width-pc) !important; position: fixed !important; }
      .content { left: var(--sidebar-width-pc) !important; position: absolute !important; transition: left 0.3s ease; }
      body.close .sidebar { transform: translateX(-250px) !important; }
      body.close .content { left: 0 !important; }
    }

    /* [4. ★ 휴대폰 전용: 자석처럼 붙는 사이드바 ★] */
    @media screen and (max-width: 768px) {
      /* 사이드바 설정 */
      .sidebar {
        width: var(--sidebar-width-mobile) !important;
        height: 100vh !important;
        left: 0 !important; top: 0 !important;
        transition: transform 0.3s ease !important;
        z-index: 1000 !important;
      }

      /* 본문 영역 설정 */
      .content {
        position: absolute !important;
        transition: all 0.3s ease !important;
      }

      /* ★ 상황 1: 메뉴가 닫혔을 때 (body.close) ★ */
      body.close .sidebar { transform: translateX(-180px) !important; } /* 완전히 숨김 */
      body.close .content { 
        left: 0 !important; /* 왼쪽 끝으로 복귀 */
        width: 100% !important; /* 화면 꽉 채움 */
      }

      /* ★ 상황 2: 메뉴가 열렸을 때 (body:not(.close)) ★ */
      body:not(.close) .sidebar { transform: translateX(0) !important; } /* 메뉴 나타남 */
      body:not(.close) .content {
        left: var(--sidebar-width-mobile) !important; /* 사이드바 폭만큼 이동 */
        width: calc(100% - var(--sidebar-width-mobile)) !important; /* 남은 공간에 딱 맞춤 */
      }

      /* 초록색 삼선 버튼 (적당한 80px 크기) */
      .sidebar-toggle {
        width: 80px !important; height: 80px !important;
        background: #28a745 !important;
        left: 15px !important; bottom: 25px !important; top: auto !important;
        display: flex !important; align-items: center; justify-content: center;
        border-radius: 50% !important; z-index: 1001 !important;
      }
      .sidebar-toggle span { width: 40px !important; height: 5px !important; background: white !important; margin: 5px 0 !important; display: block; }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      basePath: './'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>

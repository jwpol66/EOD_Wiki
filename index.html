<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <style>
    :root {
      --sidebar-width: 250px;
    }

    /* [1. 사이드바 디자인 - 정원님 스타일 유지] */
    .sidebar .app-name a {
      font-size: 30px !important;
      color: #0056b3 !important;
      font-weight: 800 !important;
      text-decoration: none !important;
    }
    .sidebar-nav strong {
      font-size: 22px !important;
      color: #28a745 !important;
      display: block !important;
      margin-top: 20px !important;
    }
    .sidebar-nav ul li a {
      font-size: 19px !important;
      color: #444 !important;
    }
    .sidebar-nav a:hover {
      color: #ff5722 !important; /* 빨강/주황 호버 유지 */
      text-decoration: underline !important;
    }

    /* [2. 본문 글자 크기 - 왕글씨 유지] */
    .markdown-section {
      font-size: 28px !important; 
      line-height: 1.6 !important;
      color: #222 !important;
      padding-top: 50px !important; /* 상단 삼선 메뉴 공간 확보 */
    }
    .markdown-section h1 { font-size: 40px !important; }
    .markdown-section h2 { font-size: 35px !important; }

    /* [3. ★ 핵심: 모바일 반응형 설정 ★] */
    
    /* PC/태블릿 (화면이 넓을 때) */
    @media screen and (min-width: 769px) {
      .content {
        left: var(--sidebar-width) !important;
      }
    }

    /* 휴대폰 (화면이 좁을 때) */
    @media screen and (max-width: 768px) {
      .content {
        left: 0 !important; /* 본문을 왼쪽 끝까지 붙임 */
        position: relative !important;
        transition: transform 0.25s ease-out;
      }
      /* 사이드바가 열릴 때 본문을 옆으로 밀어냄 */
      body.close .content {
        transform: translateX(0);
      }
      .markdown-section {
        padding-left: 20px !important; /* 가려짐 방지 여백 */
        padding-right: 20px !important;
      }
      /* 삼선 메뉴 버튼 크기 확대 (현장 조작용) */
      .sidebar-toggle {
        width: 50px !important;
        height: 50px !important;
        background: rgba(255,255,255,0.8) !important;
        padding: 10px !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'EOD 지식창고',
      loadSidebar: true,
      subMaxLevel: 2,
      // 모바일에서 사이드바를 자동으로 닫아주는 설정
      auto2top: true
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
